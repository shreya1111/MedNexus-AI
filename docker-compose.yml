version: '3.9'

networks:
  mednexus-net:
    driver: bridge

volumes:
  mongodb_data:
  redis_data:
  mlflow_data:
  prometheus_data:
  grafana_data:

services:
  # ─── Infrastructure ────────────────────────────────────────
  mongodb:
    image: mongo:7.0
    container_name: mednexus-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-mednexus_secret}
      MONGO_INITDB_DATABASE: mednexus
    volumes:
      - mongodb_data:/data/db
    networks:
      - mednexus-net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 5

  redis:
    image: redis:7.2-alpine
    container_name: mednexus-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis_secret}
    volumes:
      - redis_data:/data
    networks:
      - mednexus-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ─── Application ───────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mednexus-backend
    restart: unless-stopped
    env_file: .env
    environment:
      MONGODB_URI: mongodb://admin:${MONGO_PASSWORD:-mednexus_secret}@mongodb:27017/mednexus?authSource=admin
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379
      NODE_ENV: production
    ports:
      - "5000:5000"
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - mednexus-net
    volumes:
      - ./backend/logs:/app/logs

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mednexus-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://backend:5000/api/v1
      NEXT_PUBLIC_AI_URL: http://ai-services:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - mednexus-net

  ai-services:
    build:
      context: ./ai-services
      dockerfile: Dockerfile
    container_name: mednexus-ai
    restart: unless-stopped
    env_file: .env
    environment:
      AI_SERVICE_PORT: "8000"
    ports:
      - "8000:8000"
    networks:
      - mednexus-net

  # ─── NGINX Reverse Proxy ───────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: mednexus-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
      - ai-services
    networks:
      - mednexus-net

  # ─── MLOps ─────────────────────────────────────────────────
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.9.2
    container_name: mednexus-mlflow
    restart: unless-stopped
    command: mlflow server --host 0.0.0.0 --port 5001 --backend-store-uri sqlite:///mlflow.db --default-artifact-root /mlflow/artifacts
    ports:
      - "5001:5001"
    volumes:
      - mlflow_data:/mlflow
    networks:
      - mednexus-net

  # ─── Monitoring ────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.48.1
    container_name: mednexus-prometheus
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=15d
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - mednexus-net

  grafana:
    image: grafana/grafana:10.2.3
    container_name: mednexus-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    networks:
      - mednexus-net

<body class="bg-surface-base text-on-surface font-body-md selection:bg-primary-container selection:text-on-primary-container">
<!-- Top App Bar (Task-Focused: Suppressing Main Nav) -->
<header class="sticky top-0 z-50 w-full h-16 flex items-center justify-between px-gutter backdrop-blur-xl bg-surface-glass border-b border-outline-variant/30 shadow-sm">
<div class="flex items-center gap-4">
<button class="active:scale-95 transition-transform p-1 -ml-2 text-on-surface hover:bg-surface-container-high rounded-full">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="font-headline-md text-headline-md font-bold text-primary">Settings</h1>
</div>
<button class="active:scale-95 transition-transform p-2 text-on-surface-variant hover:bg-surface-container-high rounded-full">
<span class="material-symbols-outlined">help_outline</span>
</button>
</header>
<main class="max-w-md mx-auto px-gutter py-8 space-y-8 animate-in fade-in slide-in-from-bottom-4 duration-700">
<!-- Profile Anchor -->
<section class="flex items-center gap-4 p-4 glass-card rounded-xl">
<div class="w-16 h-16 rounded-full border-2 border-primary-container/30 overflow-hidden">
<img class="w-full h-full object-cover" data-alt="A professional close-up portrait of a medical doctor in a dark, high-tech environment. Soft cyan clinical light illuminates their face against a deep oceanic background. The style is sophisticated and corporate modern, reflecting clinical intelligence and precision with a shallow depth of field." src="https://lh3.googleusercontent.com/aida-public/AB6AXuCrBkmKhEvCJryVmwFgUQfwcLfbY9Zm1jsrhP63fFZtTp9_L_3PjEoX6G8ETfIgS6OUAfCFVRJvrfuOnqhbUNoOn3QekhFjvm9kFSSMNz0_FYIrA5I87HlEuScuiQr6cdUli0oAsTtDTpZGTKLy-M13IRJvTL4ZcvRGrS_AX7nf1t6KK41BZMMpP7VHyI0dphj3_0W3lHWwv6ctzSSqdrSodkPrIgrdw0vaUIsjrYGVK-Fnc7nUgDJX01n27DQC0hV-rtf9nUgpC3Q"/>
</div>
<div>
<h2 class="font-headline-md text-headline-md text-on-surface">Dr. Elena Vance</h2>
<p class="text-body-sm text-on-surface-variant">Senior Clinical Analyst</p>
</div>
<button class="ml-auto text-primary p-2 hover:bg-primary-container/10 rounded-full transition-colors">
<span class="material-symbols-outlined">edit</span>
</button>
</section>
<!-- General Settings Group -->
<div class="space-y-3">
<h3 class="font-label-caps text-label-caps text-on-surface-variant uppercase tracking-widest pl-2">System Controls</h3>
<div class="glass-card rounded-xl overflow-hidden">
<!-- Notifications Toggle -->
<div class="flex items-center justify-between p-4 hover:bg-surface-container-high transition-colors group">
<div class="flex items-center gap-4">
<div class="w-10 h-10 flex items-center justify-center rounded-lg bg-primary-container/10 text-primary-container">
<span class="material-symbols-outlined">notifications</span>
</div>
<div>
<p class="font-body-md font-semibold text-on-surface">Notifications</p>
<p class="text-body-sm text-on-surface-variant">Manage clinical alerts</p>
</div>
</div>
<div class="relative inline-block w-12 h-6 transition duration-200 ease-in-out">
<input checked="" class="toggle-checkbox absolute block w-0 h-0 opacity-0 cursor-pointer" id="toggle-notif" type="checkbox"/>
<label class="toggle-label block overflow-hidden h-6 rounded-full bg-outline-variant cursor-pointer transition-colors duration-200" for="toggle-notif">
<span class="toggle-dot block h-6 w-6 rounded-full bg-white shadow transform transition-transform duration-200"></span>
</label>
</div>
</div>
<!-- Divider -->
<div class="h-px bg-outline-variant/30 mx-4"></div>
<!-- Privacy Toggle -->
<div class="flex items-center justify-between p-4 hover:bg-surface-container-high transition-colors group">
<div class="flex items-center gap-4">
<div class="w-10 h-10 flex items-center justify-center rounded-lg bg-primary-container/10 text-primary-container">
<span class="material-symbols-outlined">lock</span>
</div>
<div>
<p class="font-body-md font-semibold text-on-surface">Privacy</p>
<p class="text-body-sm text-on-surface-variant">HIPAA compliance &amp; data</p>
</div>
</div>
<div class="relative inline-block w-12 h-6 transition duration-200 ease-in-out">
<input checked="" class="toggle-checkbox absolute block w-0 h-0 opacity-0 cursor-pointer" id="toggle-privacy" type="checkbox"/>
<label class="toggle-label block overflow-hidden h-6 rounded-full bg-outline-variant cursor-pointer transition-colors duration-200" for="toggle-privacy">
<span class="toggle-dot block h-6 w-6 rounded-full bg-white shadow transform transition-transform duration-200"></span>
</label>
</div>
</div>
<!-- Divider -->
<div class="h-px bg-outline-variant/30 mx-4"></div>
<!-- Security Navigation -->
<button class="w-full flex items-center justify-between p-4 hover:bg-surface-container-high transition-all active:scale-[0.98]">
<div class="flex items-center gap-4 text-left">
<div class="w-10 h-10 flex items-center justify-center rounded-lg bg-primary-container/10 text-primary-container">
<span class="material-symbols-outlined">security</span>
</div>
<div>
<p class="font-body-md font-semibold text-on-surface">Security</p>
<p class="text-body-sm text-on-surface-variant">Biometrics &amp; passwords</p>
</div>
</div>
<span class="material-symbols-outlined text-on-surface-variant">chevron_right</span>
</button>
</div>
</div>
<!-- Advanced Group -->
<div class="space-y-3">
<h3 class="font-label-caps text-label-caps text-on-surface-variant uppercase tracking-widest pl-2">Integration &amp; UI</h3>
<div class="glass-card rounded-xl overflow-hidden">
<!-- API Keys Sub-page Navigation -->
<button class="w-full flex items-center justify-between p-4 hover:bg-surface-container-high transition-all active:scale-[0.98]">
<div class="flex items-center gap-4 text-left">
<div class="w-10 h-10 flex items-center justify-center rounded-lg bg-secondary-container/10 text-secondary">
<span class="material-symbols-outlined">key</span>
</div>
<div>
<p class="font-body-md font-semibold text-on-surface">API Keys</p>
<p class="text-body-sm text-on-surface-variant">Manage developer access</p>
</div>
</div>
<span class="material-symbols-outlined text-on-surface-variant">chevron_right</span>
</button>
<!-- Divider -->
<div class="h-px bg-outline-variant/30 mx-4"></div>
<!-- Appearance Sub-page Navigation -->
<button class="w-full flex items-center justify-between p-4 hover:bg-surface-container-high transition-all active:scale-[0.98]">
<div class="flex items-center gap-4 text-left">
<div class="w-10 h-10 flex items-center justify-center rounded-lg bg-secondary-container/10 text-secondary">
<span class="material-symbols-outlined">palette</span>
</div>
<div>
<p class="font-body-md font-semibold text-on-surface">Appearance</p>
<p class="text-body-sm text-on-surface-variant">Themes &amp; accessibility</p>
</div>
</div>
<span class="material-symbols-outlined text-on-surface-variant">chevron_right</span>
</button>
</div>
</div>
<!-- Danger Zone -->
<div class="space-y-3">
<div class="glass-card rounded-xl overflow-hidden border-error/20">
<button class="w-full flex items-center gap-4 p-4 hover:bg-error-container/10 transition-colors group">
<div class="w-10 h-10 flex items-center justify-center rounded-lg bg-error-container/10 text-error">
<span class="material-symbols-outlined">logout</span>
</div>
<div class="text-left">
<p class="font-body-md font-semibold text-error">Sign Out</p>
<p class="text-body-sm text-on-surface-variant">Active session: iPhone 15 Pro</p>
</div>
</button>
</div>
</div>
<!-- Footer Info -->
<div class="text-center pt-4 pb-12">
<p class="text-label-caps font-label-caps text-outline">MedNexus-AI v2.4.0-stable</p>
<p class="text-[10px] text-outline/50 mt-1 uppercase tracking-tighter">Powered by Clinical Intel Engine</p>
</div>
</main>
<!-- Contextual Atmospheric Element (Subtle Glow) -->
<div class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full h-1/2 pointer-events-none z-0 opacity-20">
<div class="absolute inset-0 bg-gradient-to-t from-primary-container/20 to-transparent blur-3xl"></div>
</div>
<script>
        // Simple Interaction Feedback for Toggles
        document.querySelectorAll('.toggle-checkbox').forEach(toggle => {
            toggle.addEventListener('change', (e) => {
                const label = e.target.closest('div').querySelector('p:first-child');
                if (e.target.checked) {
                    console.log(`${label.textContent} enabled`);
                } else {
                    console.log(`${label.textContent} disabled`);
                }
            });
        });

        // Haptic-like feedback for buttons
        document.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('click', () => {
                if (window.navigator.vibrate) {
                    window.navigator.vibrate(5);
                }
            });
        });
    </script>
</body></html>

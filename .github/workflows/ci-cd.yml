name: MedNexus AI — CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'
  PYTHON_VERSION: '3.11'

jobs:
  # ─── Backend Lint + Test ─────────────────────────────────────────────────
  backend-ci:
    name: Backend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test
        env:
          NODE_ENV: test
          JWT_SECRET: test-jwt-secret-for-ci
          JWT_REFRESH_SECRET: test-refresh-secret-for-ci
          MONGODB_URI: mongodb://localhost:27017/mednexus_test

      - name: Build
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-dist
          path: backend/dist
          retention-days: 7

  # ─── Frontend Lint + Build ───────────────────────────────────────────────
  frontend-ci:
    name: Frontend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: https://api.mednexus.ai/api/v1
          NEXT_PUBLIC_AI_URL: https://ai.mednexus.ai

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-next
          path: frontend/.next
          retention-days: 7

  # ─── AI Services Syntax Check ────────────────────────────────────────────
  ai-services-ci:
    name: AI Services CI
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: ai-services/requirements.txt

      - name: Install dependencies
        run: pip install fastapi uvicorn pydantic python-dotenv httpx

      - name: Syntax check
        run: python -m py_compile ai-services/main.py && echo "Syntax OK"

      - name: Import check
        run: python -c "import fastapi, uvicorn, pydantic; print('Imports OK')"

  # ─── ML Models CI ────────────────────────────────────────────────────────
  ml-models-ci:
    name: ML Models CI
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install scikit-learn numpy pandas joblib

      - name: Train & validate diabetes model
        run: |
          cd ml-models
          python scripts/train_diabetes.py
          python -c "
          import joblib, numpy as np
          model = joblib.load('models/diabetes_model.pkl')
          pred = model.predict([[2, 138, 62, 35, 0, 33.6, 0.627, 47, 138*33.6/100, 47*33.6/100, 1, 2]])
          print(f'Test prediction: {pred[0]} (expected: 1)')
          assert pred[0] in [0, 1], 'Invalid prediction'
          print('Model inference: PASS')
          "

      - name: Train & validate heart model
        run: |
          cd ml-models
          python scripts/train_heart.py

  # ─── Docker Build ────────────────────────────────────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend-ci, frontend-ci, ai-services-ci]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/mednexus-backend:latest
            ${{ secrets.DOCKER_USERNAME }}/mednexus-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push AI services
        uses: docker/build-push-action@v5
        with:
          context: ./ai-services
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/mednexus-ai-services:latest
            ${{ secrets.DOCKER_USERNAME }}/mednexus-ai-services:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Deploy ──────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [docker-build, ml-models-ci]
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Deploy backend to Railway
        run: |
          echo "Deploying backend to Railway…"
          # railway deploy --service backend

      - name: Deploy frontend to Vercel
        run: |
          echo "Deploying frontend to Vercel…"
          # vercel --prod --token ${{ secrets.VERCEL_TOKEN }}

      - name: Notify deployment
        if: always()
        run: |
          echo "Deployment status: ${{ job.status }}"
          echo "Commit: ${{ github.sha }}"
          echo "Branch: ${{ github.ref_name }}"

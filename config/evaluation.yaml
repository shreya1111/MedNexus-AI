# MedNexus-AI Chunk Quality Evaluation Configuration
# Configuration for chunk quality metrics and benchmarking

version: "1.0"

# Quality Score Weights (must sum to 1.0)
quality_weights:
  chunk_size: 0.15          # Appropriate chunk sizing
  metadata: 0.10            # Complete metadata
  structure: 0.15           # Section/heading preservation
  lists: 0.10               # List preservation
  tables: 0.10              # Table preservation
  duplicates: 0.10          # Duplicate detection
  overlap: 0.10             # Appropriate overlap
  readability: 0.10         # Text readability
  density: 0.10             # Information density

# Chunk Size Thresholds
chunk_size:
  ideal_min: 300            # Ideal minimum characters
  ideal_max: 1500           # Ideal maximum characters
  warning_min: 100          # Warning below this
  warning_max: 2500         # Warning above this
  critical_min: 50          # Critical below this
  critical_max: 5000        # Critical above this

# Token Limits
tokens:
  estimate_method: "simple" # simple or tiktoken
  words_per_token: 1.3      # Average words per token
  warning_limit: 500        # Warn above this
  critical_limit: 2000      # Error above this

# Overlap Analysis
overlap:
  ideal_percentage: 15      # Ideal overlap percentage
  min_percentage: 5         # Minimum acceptable
  max_percentage: 30        # Maximum acceptable
  warning_below: 10         # Warning if below
  warning_above: 25         # Warning if above

# Duplicate Detection
duplicates:
  exact_match: true         # Detect exact duplicates
  near_duplicate_threshold: 0.95  # Similarity threshold
  checksum_comparison: true
  max_acceptable_rate: 0.01 # 1% duplicates acceptable

# Structure Preservation
structure:
  detect_headers: true
  detect_lists: true
  detect_tables: true
  min_header_preservation: 0.8   # 80% headers should be preserved
  min_list_preservation: 0.7     # 70% lists should be intact
  min_table_preservation: 0.6    # 60% tables should be intact

# Density Analysis
density:
  min_useful_text_ratio: 0.6     # 60% useful text
  max_whitespace_ratio: 0.3      # 30% whitespace
  max_repeated_text_ratio: 0.2   # 20% repeated text
  min_density_score: 0.7         # Minimum acceptable

# Readability
readability:
  ideal_sentence_length: 20      # Words per sentence
  max_sentence_length: 40        # Maximum words
  ideal_words_per_chunk: 150     # Ideal word count
  min_words_per_chunk: 50        # Minimum acceptable

# Metadata Validation
metadata:
  required_fields:
    - chunk_id
    - document_id
    - source
    - text
    - chunk_index
    - total_chunks
    - start_character
    - end_character
    - word_count
    - checksum
    - created_at
  
  optional_fields:
    - title
    - section
    - language
    - tokens
    - has_code
    - has_list
    - has_table

# Language Detection
language:
  enabled: false            # Enable language detection
  expected_language: "en"
  warn_on_mixed: true
  utf8_validation: true

# Benchmark Comparison
benchmark:
  compare_strategies: true
  strategies:
    - recursive
    - fixed
    - paragraph
    - section
  
  metrics:
    - average_chunk_size
    - chunk_count
    - overlap_percentage
    - duplicate_rate
    - processing_time
    - quality_score

# Recommendations
recommendations:
  enabled: true
  auto_generate: true
  confidence_threshold: 0.7  # Only show high-confidence recommendations
  
  rules:
    - name: "chunk_size_too_small"
      condition: "average_size < 300"
      message: "Consider increasing chunk size for better context"
      
    - name: "chunk_size_too_large"
      condition: "average_size > 1500"
      message: "Consider decreasing chunk size for better retrieval"
      
    - name: "low_overlap"
      condition: "overlap_percentage < 10"
      message: "Increase overlap to improve context continuity"
      
    - name: "high_overlap"
      condition: "overlap_percentage > 25"
      message: "Decrease overlap to reduce redundancy"
      
    - name: "high_duplicates"
      condition: "duplicate_rate > 0.05"
      message: "High duplicate rate detected - review chunking strategy"
      
    - name: "poor_structure_preservation"
      condition: "structure_score < 0.7"
      message: "Headers/lists/tables are being split - consider section-aware chunking"

# Visualization
visualization:
  generate_histogram_data: true
  histogram_bins: 50
  
  charts:
    - chunk_size_distribution
    - token_distribution
    - overlap_distribution
    - quality_score_distribution
    - strategy_comparison
    - duplicate_heatmap

# Performance
performance:
  batch_size: 1000          # Process chunks in batches
  enable_caching: true
  parallel_processing: false # For future implementation

# Output
output:
  format: "json"
  indent: 2
  include_visualization_data: true
  include_recommendations: true
  include_sample_chunks: true
  sample_size: 10
  
  reports:
    - chunk_quality_report.json
    - chunk_statistics.json
    - chunk_benchmark.csv
    - chunk_recommendations.md
    - quality_dashboard.json

# Logging
logging:
  level: "INFO"
  log_metrics: true
  log_recommendations: true
  log_warnings: true
